<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我话你猜</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>我话你猜</h1>
        </div>
        <div class="status-pill" id="connectionStatus">准备连接</div>
      </header>

      <section class="setup-panel" id="setupPanel">
        <div class="mode-grid">
          <button class="mode-card active" id="hostModeButton" type="button">
            <span>创建房间</span>
            <small>选择人数、管理座位、开始对局</small>
          </button>
          <button class="mode-card" id="guestModeButton" type="button">
            <span>加入房间</span>
            <small>输入房间号后自由落座</small>
          </button>
        </div>

        <div class="setup-grid">
          <div class="panel" id="hostSetup">
            <h2>房主设置</h2>
            <label>
              昵称
              <input id="hostNameInput" autocomplete="off" maxlength="12" value="房主">
            </label>
            <label>
              玩家人数
              <select id="playerCountSelect">
                <option value="2">2 人 / 1 队</option>
                <option value="4" selected>4 人 / 2 队</option>
                <option value="6">6 人 / 3 队</option>
                <option value="8">8 人 / 4 队</option>
              </select>
            </label>
            <button class="primary full-width" id="createRoomButton" type="button">创建房间</button>
          </div>

          <div class="panel hidden" id="guestSetup">
            <h2>玩家加入</h2>
            <label>
              昵称
              <input id="guestNameInput" autocomplete="off" maxlength="12" value="玩家">
            </label>
            <label>
              房间号
              <input id="roomCodeInput" autocomplete="off" maxlength="4" placeholder="例如 A7K2">
            </label>
            <button class="primary full-width" id="joinRoomButton" type="button">加入房间</button>
          </div>
        </div>
      </section>

      <section class="room-panel hidden" id="roomPanel">
        <aside class="sidebar">
          <div class="panel host-tools hidden" id="hostTools">
            <h2>房主面板</h2>
            <div class="room-code" id="roomCodeDisplay">----</div>
            <label>
              本房人数
              <select id="roomPlayerCountSelect">
                <option value="2">2 人 / 1 队</option>
                <option value="4">4 人 / 2 队</option>
                <option value="6">6 人 / 3 队</option>
                <option value="8">8 人 / 4 队</option>
              </select>
            </label>
            <button class="primary full-width" id="startGameButton" type="button">开始游戏</button>
            <button class="danger-button full-width hidden" id="endGameButton" type="button">结束本局</button>
          </div>

          <div class="panel">
            <h2>玩家</h2>
            <div class="player-list" id="playerList"></div>
          </div>
        </aside>

        <section class="table-area">
          <div class="notice" id="gameNotice">等待创建房间。</div>

          <div class="panel">
            <div class="section-header">
              <div>
                <p class="eyebrow">座位决定队伍</p>
                <h2>席位</h2>
              </div>
              <div class="round-badge" id="roundBadge">第 0 轮</div>
            </div>
            <div class="seat-board" id="seatBoard"></div>
          </div>

          <div class="play-grid">
            <div class="panel word-panel">
              <p class="eyebrow">本局成语</p>
              <div class="idiom-value" id="idiomValue">尚未开始</div>
            </div>

            <div class="panel turn-panel">
              <div class="section-header">
                <div>
                  <p class="eyebrow">当前行动</p>
                  <h2 id="turnTitle">未开始</h2>
                </div>
                <span class="team-badge" id="teamBadge">--</span>
              </div>
              <div class="action-area" id="actionArea"></div>
            </div>
          </div>

          <div class="panel">
            <h2>公开输入记录</h2>
            <div class="log-list" id="logList"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
