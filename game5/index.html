<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UNO 联机版</title><link rel="stylesheet" href="styles.css"></head><body><main class="shell">
<header><div><p class="eyebrow">ONLINE CARD GAME</p><h1><i>U</i><i>N</i><i>O</i></h1></div><div class="status" id="connectionStatus">准备连接</div></header>
<section id="setupPanel"><div class="modes"><button class="mode active" id="hostModeButton"><b>创建房间</b><span>担任房主与规则裁判</span></button><button class="mode" id="guestModeButton"><b>加入房间</b><span>输入四位好友房间号</span></button></div>
<div class="panel setup" id="hostSetup"><div><p class="eyebrow">HOST A GAME</p><h2>建立单轮牌局</h2></div><label>昵称<input id="hostNameInput" maxlength="12" value="房主"></label><label>人数<select id="playerCountSelect"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select></label><button class="primary" id="createRoomButton">创建房间</button></div>
<div class="panel setup hidden" id="guestSetup"><div><p class="eyebrow">JOIN A GAME</p><h2>加入好友房间</h2></div><label>昵称<input id="guestNameInput" maxlength="12" value="玩家"></label><label>房间号<input id="roomCodeInput" maxlength="4" placeholder="例如 A7K2"></label><button class="primary" id="joinRoomButton">加入房间</button></div></section>
<section class="layout hidden" id="roomPanel"><aside><div class="panel"><p class="eyebrow">ROOM CODE</p><div class="room-code" id="roomCodeDisplay">----</div><div id="hostTools" class="hidden"><label>本房人数<select id="roomPlayerCountSelect"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></label><button class="primary wide" id="startGameButton">开始游戏</button><button class="challenge wide hidden" id="endGameButton">结束当前游戏</button></div></div><div class="panel rules"><p class="eyebrow">HOUSE RULES</p><p>单轮决胜 · 初始7张<br>+2 / +4 可混合叠加<br>主动喊UNO与抓UNO<br>每回合限时15秒</p></div></aside>
<section class="main"><div class="notice" id="notice">等待玩家加入。</div><div class="table panel"><div class="table-head"><span id="directionText">顺时针 ↻</span><span>摸牌堆 <b id="deckCount">0</b></span></div><div class="players" id="players"></div><div class="center"><button class="draw-pile" id="drawPile" disabled><span>UNO</span><small>摸牌</small></button><div class="discard" id="discardPile"></div></div><div class="current-color" id="currentColor">当前颜色：—</div><div class="penalty hidden" id="penaltyBanner"></div></div>
<div class="panel action-panel"><div class="action-head"><div><p class="eyebrow">YOUR TURN</p><h2 id="actionTitle">等待开始</h2></div><div class="timer"><b id="timerText">--</b><i id="timerBar"></i></div></div><div class="actions" id="actionArea"></div></div>
<div class="panel hand-panel"><div class="action-head"><div><p class="eyebrow">YOUR HAND</p><h2>我的手牌 <span id="handCount">0</span></h2></div><button class="uno-button" id="unoButton" disabled>喊 UNO！</button></div><div class="hand" id="hand"></div></div>
<div class="panel"><div class="action-head"><h2>牌局记录</h2><button class="small" id="toggleLogButton">展开 / 收起</button></div><div class="log" id="logList"></div></div></section></section>
<div class="modal hidden" id="colorModal"><div class="panel modal-card"><h2>选择接下来的颜色</h2><div class="color-grid"><button data-color="red">红色</button><button data-color="yellow">黄色</button><button data-color="green">绿色</button><button data-color="blue">蓝色</button></div><button id="cancelColorButton">取消</button></div></div>
</main><script src="app.js"></script></body></html>
